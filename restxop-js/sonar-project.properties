sonar.projectKey=restxop_restxop-js
sonar.organization=restxop
sonar.projectName=restxop-js

sonar.sources=src
sonar.tests=test
sonar.exclusions=dist/**,demo/**,scripts/**,node_modules/**
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Deliberate idioms on byte-verified wire code (same stance as the Java
# scanner): cognitive complexity is the delimiter/header automaton itself,
# and charCodeAt/fromCharCode are the correct UTF-16 code-unit tools for
# latin-1 byte strings (codePointAt changes nothing for these inputs and
# widens the type to number | undefined).
# The rejection guard must attach in the constructor: a failure occurring
# before the caller awaits anything must never surface as an unhandled
# rejection.
sonar.issue.ignore.multicriteria=complexity,codeunits,ctorguard
sonar.issue.ignore.multicriteria.ctorguard.ruleKey=typescript:S7059
sonar.issue.ignore.multicriteria.ctorguard.resourceKey=src/session.ts
sonar.issue.ignore.multicriteria.complexity.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.complexity.resourceKey=src/**
sonar.issue.ignore.multicriteria.codeunits.ruleKey=typescript:S7758
sonar.issue.ignore.multicriteria.codeunits.resourceKey=src/**
