version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/restxop"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Majors are deliberate work: the reactor intentionally maintains
    # old-major baselines (Boot 3 starter, Jackson 2 codec), which a
    # blanket "latest everything" bump would break by design
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      dependencies:
        patterns:
          - "*"
        # The reactor pins Spring at two majors at once (Boot 3 and Boot 4
        # baselines); grouping would unify them to one version and
        # downgrade the newer line — keep those as individual PRs
        exclude-patterns:
          - "org.springframework.boot:*"
          - "org.springframework.cloud:*"
      security:
        applies-to: security-updates
        patterns:
          - "*"
    reviewers:
      - "jshipman42"

  - package-ecosystem: "npm"
    directories:
      - "/restxop-js"
      - "/restxop-js/demo"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dependencies:
        patterns:
          - "*"
      security:
        applies-to: security-updates
        patterns:
          - "*"
    reviewers:
      - "jshipman42"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      actions:
        patterns:
          - "*"
