name: restxop CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly stress run (tag `stress` is excluded from regular builds)
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  build:
    if: github.event_name != 'schedule'
    name: verify (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    permissions:
      contents: write # dependency-graph submission
    strategy:
      fail-fast: false
      matrix:
        java: ["17", "25"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for Sonar blame relevancy
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Hygiene check (SC-008)
        run: restxop/build-config/check-hygiene.sh
      - name: Build and verify
        # Static analysis is pinned to the JDK 17 leg: SpotBugs cannot
        # parse newer class-file versions
        run: mvn -B -ntp -f restxop/pom.xml verify ${{ matrix.java != '17' && '-Dspotbugs.skip=true' || '' }}
      - name: SonarCloud scan
        # JDK 17 leg only; skipped on forked PRs and until SONAR_TOKEN exists
        if: >-
          matrix.java == '17' &&
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN not configured — skipping analysis"
            exit 0
          fi
          mvn -B -ntp -f restxop/pom.xml sonar:sonar \
            -Dsonar.scm.revision=${{ github.event.pull_request.head.sha || github.sha }}
      - name: Update dependency graph
        if: matrix.java == '17' && github.event_name == 'push'
        uses: advanced-security/maven-dependency-submission-action@v5
        with:
          directory: restxop

  js:
    if: github.event_name != 'schedule'
    name: restxop-js (Node + Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: restxop-js/package-lock.json
      - name: Hygiene check (SC-008)
        run: restxop/build-config/check-hygiene.sh
      - name: Install
        working-directory: restxop-js
        run: npm ci
      - name: Build, test, size gate
        working-directory: restxop-js
        run: npm test
      - name: Install Chromium
        working-directory: restxop-js
        run: npx playwright install --with-deps chromium
      - name: Browser conformance
        working-directory: restxop-js
        run: npm run test:browser

  perf:
    # Informational only: throughput guard (SC-006) must not gate merges
    if: github.event_name != 'schedule'
    name: perf (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Throughput harness
        # Tag-filtered run: the coverage gate would trivially fail
        run: mvn -B -ntp -f restxop/pom.xml -Dgroups=perf -Djacoco.skip=true verify

  stress:
    if: github.event_name == 'schedule'
    name: nightly stress (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["17", "25"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Stress suite
        # Tag-filtered run (see perf); SpotBugs pinned to JDK 17
        run: mvn -B -ntp -f restxop/pom.xml -Dgroups=stress -Djacoco.skip=true verify ${{ matrix.java != '17' && '-Dspotbugs.skip=true' || '' }}
