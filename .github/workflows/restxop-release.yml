name: restxop release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  maven:
    name: publish to Maven Central
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_TOKEN
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
      - name: Tag matches reactor version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(mvn -q -ntp -f restxop/pom.xml help:evaluate -Dexpression=project.version -DforceStdout)
          if [ "$TAG" != "$VERSION" ]; then
            echo "tag v$TAG does not match reactor version $VERSION"
            exit 1
          fi
      - name: Verify, sign, and publish
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn -B -ntp -f restxop/pom.xml -Prelease deploy

  npm:
    name: publish restxop-js to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance attestation
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: restxop-js/package-lock.json
      - name: Tag matches package version
        working-directory: restxop-js
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$VERSION" ]; then
            echo "tag v$TAG does not match package version $VERSION"
            exit 1
          fi
      - name: Install and test
        working-directory: restxop-js
        run: |
          npm ci
          npm test
      - name: Publish
        working-directory: restxop-js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
